<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>лЎңк·ёмқё мІҳлҰ¬ мӨ‘ - CaseNetAI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #0ea5e9 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .loading-container {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>лЎңк·ёмқё мІҳлҰ¬ мӨ‘...</h2>
        <p>мһ мӢңл§Ң кё°лӢӨл ӨмЈјм„ёмҡ”.</p>
    </div>

    <script>
        // мҝ нӮӨм—җм„ң access_token мқҪкё° (httpOnlyк°Җ м•„лӢҲлҜҖлЎң JSм—җм„ң м ‘к·ј к°ҖлҠҘ)
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const provider = urlParams.get('provider');
        const role = urlParams.get('role');
        const serviceType = urlParams.get('service') || 'elderly_protection';

        // мҝ нӮӨм—җм„ң нҶ нҒ° мқҪкё° (URL нҢҢлқјлҜён„°м—җм„ңлҠ” м ҲлҢҖ мқҪм§Җ м•ҠмқҢ вҖ” лёҢлқјмҡ°м Җ нһҲмҠӨнҶ лҰ¬ л…ём¶ң л°©м§Җ)
        const token = getCookie('access_token');
        // refresh_tokenмқҖ httpOnly мҝ нӮӨмқҙлҜҖлЎң JSм—җм„ң мқҪмқ„ мҲҳ м—ҶмқҢ вҶ’ лёҢлқјмҡ°м Җк°Җ мһҗлҸҷ м „мҶЎ

        if (token) {
            // localStorageм—җ access_token м ҖмһҘ (кё°мЎҙ н”„лЎ нҠём—”л“ң нҳёнҷҳм„ұ)
            localStorage.setItem('token', token);
            localStorage.setItem('authProvider', provider || 'oauth');

            // лЎңк·ёмқё м „ мҡ”мІӯн–ҲлҚҳ нҺҳмқҙм§Җк°Җ мһҲмңјл©ҙ к·ёкіімңјлЎң мқҙлҸҷ
            const savedRedirect = localStorage.getItem('loginRedirect');
            localStorage.removeItem('loginRedirect');

            // URLм—җм„ң нҶ нҒ° кҙҖл Ё нҢҢлқјлҜён„° м ңкұ° (лёҢлқјмҡ°м Җ нһҲмҠӨнҶ лҰ¬м—җ лӮЁм§Җ м•ҠлҸ„лЎқ)
            window.history.replaceState({}, '', '/login-success.html');

            setTimeout(function() {
                if (savedRedirect && savedRedirect.startsWith('/') && !savedRedirect.startsWith('//')) {
                    window.location.href = savedRedirect;
                } else if (role === 'system_admin') {
                    window.location.href = '/system-admin-dashboard.html';
                } else if (role === 'org_admin') {
                    window.location.href = '/dashboard.html';
                } else {
                    if (serviceType === 'elderly_protection') {
                        window.location.href = '/elderly-protection.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                }
            }, 500);
        } else {
            alert('лЎңк·ёмқём—җ мӢӨнҢЁн–ҲмҠөлӢҲлӢӨ. лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
